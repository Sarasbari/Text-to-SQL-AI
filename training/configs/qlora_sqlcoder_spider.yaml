# QLoRA Fine-Tuning Configuration for text-to-sql-ai

model_config:
  base_model_id: "defog/sqlcoder-7b-2"
  device: "cuda"

lora_config:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

training_arguments:
  output_dir: "./checkpoints"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 0.0002 # 2e-4
  optim: "paged_adamw_8bit"
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_strategy: "epoch"
  evaluation_strategy: "no"
  fp16: false
  bf16: true # recommended for A100 GPU environments
  max_grad_norm: 0.3
  weight_decay: 0.001

dataset:
  max_seq_length: 2048
  train_file: "./dataset_train_sqlcoder.jsonl"
